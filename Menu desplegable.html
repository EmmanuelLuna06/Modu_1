<!DOCTYPE html>
<html lang="en">
<head>

</head>

        <div class="right">

            <a href="#" class="icons-header">

            <ul>

                <li>

                    </a>

      <img src="/Pagina/moda.png" alt="Moda" class="categoria-img">

      <img src="/Pagina/tecno.png" alt="Tecnologia" class="categoria-img">

    </div>
    
    <div class="categoria-item">
      <img src="/Pagina/herramientas.png    " alt="Herramientas" class="categoria-img">
      <p class="categoria-nombre">Herramientas</p>

  </div>
</section>
